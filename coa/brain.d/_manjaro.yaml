# ==============================================================================
# REMASTERING PROFILE FOR MANJARO (OA)
# ==============================================================================

remaster:
  - name: "coa-fs-setup"
    description: "Preparazione filesystem e mount (proiezione host)"
    command: "oa_mount_logic" # Go espanderà questo in oa_mkdir, oa_cp e oa_bind

  # ---------------------------------------------------------
  # PREPARAZIONE BOOTLOADERS E UEFI
  # ---------------------------------------------------------
  - name: "coa-bootloaders"
    description: "Copia dei bootloader e creazione immagine FAT per UEFI"
    command: "oa_shell"
    run_command: |
      set -e
      mkdir -p /home/eggs/isodir/live
      mkdir -p /home/eggs/isodir/isolinux
      mkdir -p /home/eggs/isodir/boot/grub
      mkdir -p /home/eggs/isodir/EFI/BOOT
      
      # ISOLINUX
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.bin /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/syslinux/modules/bios/*.c32 /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.cfg /home/eggs/isodir/isolinux/ 2>/dev/null || touch /home/eggs/isodir/isolinux/isolinux.cfg
      
      # GRUB & UEFI
      cp /tmp/coa/bootloaders/grub/grub.cfg /home/eggs/isodir/boot/grub/ 2>/dev/null || touch /home/eggs/isodir/boot/grub/grub.cfg
      cp /tmp/coa/bootloaders/grub/x86_64-efi/monolithic/grubx64.efi /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI
      
      # Creazione FAT EFI IMG
      dd if=/dev/zero of=/home/eggs/isodir/EFI/BOOT/efi.img bs=1k count=8192
      mkfs.vfat /home/eggs/isodir/EFI/BOOT/efi.img
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI/BOOT
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/boot/grub/grub.cfg ::/EFI/BOOT/grub.cfg

  - name: "coa-identity"
    description: "Gestione nativa identità (Purge & Inject stile Yocto)"
    command: "oa_users"
    # Nota: Go inietterà automaticamente l'oggetto "users" qui

  - name: "coa-privileges"
    description: "Abilitazione poteri sudo per il gruppo live"
    command: "oa_shell"
    run_command: "sh -c \"echo '%sudo ALL=(ALL:ALL) NOPASSWD: ALL' > /etc/sudoers.d/10-live-group && chmod 440 /etc/sudoers.d/10-live-group\""
    chroot: true

  # ---------------------------------------------------------
  # GENERAZIONE INITRAMFS (MANJARO/MISO STYLE)
  # ---------------------------------------------------------
  - name: "coa-initrd"
    description: "Generazione Initramfs tramite mkinitcpio (Miso hooks)"
    command: "oa_shell"
    run_command: |
      mv /etc/mkinitcpio.conf /etc/mkinitcpio.conf.bak
      cat << 'EOF' > /etc/mkinitcpio.conf
      MODULES=(loop dm-snapshot btrfs)
      HOOKS=(base udev microcode modconf kms memdisk miso miso_loop_mnt miso_pxe_common miso_pxe_nbd miso_pxe_http miso_pxe_nfs block filesystems keyboard keymap consolefont filesystems fsck)
      COMPRESSION="zstd"      
      EOF
      mkinitcpio -P
      mv /etc/mkinitcpio.conf.bak /etc/mkinitcpio.conf
    chroot: true

  # ---------------------------------------------------------
  # COPIA KERNEL E INITRD (DINAMICA)
  # ---------------------------------------------------------
  - name: "coa-kernel-copy"
    description: "Copia del Kernel e Initrd (auto-rilevamento Arch)"
    command: "oa_shell"
    run_command: |
      # Troviamo dinamicamente il primo kernel e il suo initramfs principale (ignorando i fallback)
      KERNEL=$(ls /home/eggs/liveroot/boot/vmlinuz-* | head -n 1)
      INITRD=$(ls /home/eggs/liveroot/boot/initramfs-*.img | grep -v fallback | head -n 1)
      
      if [ -z "$KERNEL" ] || [ -z "$INITRD" ]; then
        echo "ERRORE CRITICO: Kernel o Initrd non trovati in /boot!" >&2
        exit 1
      fi
      
      cp "$KERNEL" /home/eggs/isodir/live/vmlinuz
      cp "$INITRD" /home/eggs/isodir/live/initrd.img
    chroot: false


  - name: "coa-bootloaders"
    description: "Copia dei bootloader (ISOLINUX/GRUB) e creazione immagine FAT per UEFI"
    command: "oa_shell"
    run_command: |
      set -e
      mkdir -p /home/eggs/isodir/isolinux
      mkdir -p /home/eggs/isodir/boot/grub
      mkdir -p /home/eggs/isodir/EFI/BOOT
      
      # 1. ISOLINUX: Copiamo il binario e i moduli .c32 dal PERCORSO CORRETTO
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.bin /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/syslinux/modules/bios/*.c32 /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.cfg /home/eggs/isodir/isolinux/ 2>/dev/null || touch /home/eggs/isodir/isolinux/isolinux.cfg
      
      # 2. GRUB: Copiamo il config
      cp /tmp/coa/bootloaders/grub/grub.cfg /home/eggs/isodir/boot/grub/ 2>/dev/null || touch /home/eggs/isodir/boot/grub/grub.cfg
      cp /tmp/coa/bootloaders/grub/grub.cfg /home/eggs/isodir/EFI/BOOT/grub.cfg 2>/dev/null || touch /home/eggs/isodir/EFI/BOOT/grub.cfg
      
      # 3. UEFI: Copiamo il payload EFI monolitico
      cp /tmp/coa/bootloaders/grub/x86_64-efi/monolithic/grubx64.efi /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI
      
      # 4. Creazione FAT EFI IMG
      dd if=/dev/zero of=/home/eggs/isodir/EFI/BOOT/efi.img bs=1k count=8192
      mkfs.vfat /home/eggs/isodir/EFI/BOOT/efi.img
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI/BOOT
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/grub.cfg ::/EFI/BOOT/grub.cfg

  # ---------------------------------------------------------
  # GENERAZIONE MENU DI BOOT (MISO STYLE)
  # ---------------------------------------------------------
  - name: "coa-live-menus"
    description: "Generazione configurazioni di boot (Manjaro style)"
    command: "oa_shell"
    chroot: false
    run_command: |
      # Ensure directories exist before writing
      mkdir -p /home/eggs/isodir/boot/grub
      mkdir -p /home/eggs/isodir/isolinux

      VOL_ID="OA_LIVE"
      BOOT_PARAMS="misobasedir=manjaro misolabel=${VOL_ID} cow_spacesize=2G quiet splash"
      WORK_DIR="/home/eggs/isodir"

      # 1. GRUB.cfg
      cat <<EOF > ${WORK_DIR}/boot/grub/grub.cfg
      set timeout=5
      set default=0
      insmod all_video
      search --no-floppy --set=root --label ${VOL_ID}

      menuentry "Start Manjaro Live (OA Edition)" {
          linux /live/vmlinuz ${BOOT_PARAMS}
          initrd /live/initrd.img
      }
      EOF

      # 2. ISOLINUX.cfg
      cat <<EOF > ${WORK_DIR}/isolinux/isolinux.cfg
      UI vesamenu.c32
      TIMEOUT 50
      DEFAULT manjaro
      LABEL manjaro
          MENU LABEL Start Manjaro Live
          LINUX /live/vmlinuz
          INITRD /live/initrd.img ${BOOT_PARAMS}
      EOF
    # ---------------------------------------------------------
  # COMPRESSIONE SQUASHFS
  # ---------------------------------------------------------
  - name: "coa-squashfs"
    description: "Compressione del sistema (ZSTD)"
    command: "oa_shell"
    run_command: "mksquashfs /home/eggs/liveroot /home/eggs/isodir/live/filesystem.squashfs -comp zstd -Xcompression-level 3 -b 1M -processors 4 -noappend -wildcards -ef /tmp/coa/excludes.list"

  # ---------------------------------------------------------
  # MANJARO-COMPATIBILITY: Directory and Link
  # ---------------------------------------------------------
  - name: "coa-manjaro-compat"
    description: "Creazione gancio di compatibilità per Miso"
    command: "oa_shell"
    run_command: |
      cd /home/eggs/isodir
      mkdir -p manjaro/x86_64
      ln -f live/filesystem.squashfs manjaro/x86_64/livefs.sfs
    chroot: false

# ---------------------------------------------------------
  # MASTERIZZAZIONE ISO (XORRISO)
  # ---------------------------------------------------------
  - name: "coa-xorriso"
    description: "Masterizzazione ISO finale"
    command: "oa_shell"
    run_command: "xorriso -as mkisofs -R -V 'OA_LIVE' -isohybrid-mbr /tmp/coa/bootloaders/ISOLINUX/isohdpfx.bin -partition_offset 16 -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e EFI/BOOT/efi.img -no-emul-boot -isohybrid-gpt-basdat -o ${ISO_OUTPUT} /home/eggs/isodir"

  # ---------------------------------------------------------
  # PULIZIA FINALE
  # ---------------------------------------------------------
  - name: "coa-cleanup"
    description: "Smontaggio e pulizia"
    command: "oa_umount"
